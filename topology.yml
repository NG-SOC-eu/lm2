name: ngsoc-lm2
# RITA (rita-server) reachable at rita-server (10.0.12.60)
hosts:
  - name: bank-analyst
    base_box:
      image: kali
      mgmt_user: debian
    flavor: standard.medium
  - name: bank-web
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small
  - name: bank-db
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small
  - name: corp-workstation
    base_box:
      image: kali
      mgmt_user: debian
    flavor: standard.medium
  - name: scada-server
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small
  - name: substation-rtu
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small
  - name: rita-server
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
    flavor: standard.small
routers:
  - name: router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small
wan:
  name: internet
  cidr: 100.100.100.0/24
networks:
  - name: bank-net
    cidr: 10.0.12.0/24
  - name: ics-net
    cidr: 10.0.13.0/24
net_mappings:
  - host: bank-analyst
    network: bank-net
    ip: 10.0.12.10
  - host: bank-web
    network: bank-net
    ip: 10.0.12.20
  - host: bank-db
    network: bank-net
    ip: 10.0.12.30
  - host: corp-workstation
    network: ics-net
    ip: 10.0.13.10
  - host: scada-server
    network: ics-net
    ip: 10.0.13.20
  - host: substation-rtu
    network: ics-net
    ip: 10.0.13.30
  - host: rita-server
    network: bank-net
    ip: 10.0.12.60
router_mappings:
  - router: router
    network: bank-net
    ip: 10.0.12.1
  - router: router
    network: ics-net
    ip: 10.0.13.1
groups: []
